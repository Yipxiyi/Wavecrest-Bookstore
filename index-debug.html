<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavecrest Bookstore｜没有人是一座孤岛</title>
    <meta name="description" content="Wavecrest Bookstore - 让阅读成为连接我们的浪潮">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation - Icon Only -->
    <nav class="nav" id="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 16C4 16 12 8 20 16C28 24 36 16 44 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M4 24C4 24 12 16 20 24C28 32 36 24 44 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
                </svg>
                <span class="logo-text">浪潮书店</span>
            </a>
            
            <div class="nav-icons">
                <a href="index.html" class="nav-icon active" title="首页">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                </a>
                <a href="articles.html" class="nav-icon" title="文章">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </a>
                <a href="search.html" class="nav-icon" title="搜索">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </a>
                <a href="about.html" class="nav-icon" title="关于">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </a>
            </div>
            
            <button class="nav-toggle" id="navToggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Hero Carousel -->
    <section class="hero-carousel" id="heroCarousel">
        <div class="carousel-container" id="carouselContainer">
            <!-- Carousel items will be loaded by JS -->
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
        <button class="carousel-btn carousel-prev" id="carouselPrev">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <button class="carousel-btn carousel-next" id="carouselNext">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
    </section>

    <!-- Book Library Sections -->
    <main class="library" id="library">
        <!-- 最近新增 -->
        <section class="section section-compact" id="recent">
            <div class="container">
                <div class="section-header-compact">
                    <div class="section-title-wrap">
                        <span class="section-tag">New Arrivals</span>
                        <h2 class="section-title">最近新增</h2>
                    </div>
                    <a href="search.html" class="section-more">查看全部 ›</a>
                </div>
                <div class="books-scroll" id="recentScroll">
                    <button class="scroll-btn scroll-prev" aria-label="向左滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <div class="books-scroll-container" id="recentContainer"></div>
                    <button class="scroll-btn scroll-next" aria-label="向右滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- 编辑精选 -->
        <section class="section section-compact section-alt" id="featured">
            <div class="container">
                <div class="section-header-compact">
                    <div class="section-title-wrap">
                        <span class="section-tag">Editor's Choice</span>
                        <h2 class="section-title">编辑精选</h2>
                    </div>
                    <a href="search.html" class="section-more">查看全部 ›</a>
                </div>
                <div class="books-scroll" id="featuredScroll">
                    <button class="scroll-btn scroll-prev" aria-label="向左滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <div class="books-scroll-container" id="featuredContainer"></div>
                    <button class="scroll-btn scroll-next" aria-label="向右滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- 热门借阅 -->
        <section class="section section-compact" id="popular">
            <div class="container">
                <div class="section-header-compact">
                    <div class="section-title-wrap">
                        <span class="section-tag">Popular</span>
                        <h2 class="section-title">热门借阅</h2>
                    </div>
                    <a href="search.html" class="section-more">查看全部 ›</a>
                </div>
                <div class="books-scroll" id="popularScroll">
                    <button class="scroll-btn scroll-prev" aria-label="向左滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <div class="books-scroll-container" id="popularContainer"></div>
                    <button class="scroll-btn scroll-next" aria-label="向右滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- 经典重温 -->
        <section class="section section-compact section-alt" id="classic">
            <div class="container">
                <div class="section-header-compact">
                    <div class="section-title-wrap">
                        <span class="section-tag">Classics</span>
                        <h2 class="section-title">经典重温</h2>
                    </div>
                    <a href="search.html" class="section-more">查看全部 ›</a>
                </div>
                <div class="books-scroll" id="classicScroll">
                    <button class="scroll-btn scroll-prev" aria-label="向左滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <div class="books-scroll-container" id="classicContainer"></div>
                    <button class="scroll-btn scroll-next" aria-label="向右滑动">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <svg class="footer-logo" viewBox="0 0 48 32" fill="none">
                        <path d="M4 16C4 16 12 8 20 16C28 24 36 16 44 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 24C4 24 12 16 20 24C28 32 36 24 44 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                    </svg>
                    <span class="footer-brand-text">浪潮书店</span>
                    <p class="footer-slogan">没有人是一座孤岛。</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="articles.html">文章</a>
                    <a href="search.html">搜索</a>
                    <a href="about.html">关于</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Wavecrest Bookstore. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app-debug.js"></script>
</body>
</html>

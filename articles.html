<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Wavecrest Bookstore</title>
    <meta name="description" content="Wavecrest Bookstore 原创文章">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/articles.css">
</head>
<body>
    <!-- Navigation - Icon Only -->
    <nav class="nav" id="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 16C4 16 12 8 20 16C28 24 36 16 44 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M4 24C4 24 12 16 20 24C28 32 36 24 44 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
                </svg>
            </a>
            
            <div class="nav-icons">
                <a href="index.html" class="nav-icon" title="首页">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                </a>
                <a href="articles.html" class="nav-icon active" title="文章">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </a>
                <a href="search.html" class="nav-icon" title="搜索">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </a>
                <a href="about.html" class="nav-icon" title="关于">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </a>
            </div>
            
            <button class="nav-toggle" id="navToggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Blog Header -->
    <header class="blog-header">
        <div class="container">
            <div class="blog-header-content">
                <span class="section-tag">Articles</span>
                <h1 class="blog-title">浪潮阅读</h1>
                <p class="blog-subtitle">关于书、关于人、关于连接</p>
            </div>
        </div>
    </header>

    <!-- Blog Layout -->
    <main class="blog-layout">
        <div class="container">
            <div class="blog-grid">
                <!-- Main Content - Article List -->
                <div class="blog-main">
                    <!-- Featured Articles -->
                    <section class="featured-articles" id="featuredArticles">
                        <h2 class="section-label">编辑推荐</h2>
                        <div class="featured-grid" id="featuredGrid">
                            <!-- Featured articles loaded by JS -->
                        </div>
                    </section>

                    <!-- Article List -->
                    <section class="article-list" id="articleList">
                        <div class="list-header">
                            <h2 class="section-label">最新文章</h2>
                            <div class="filter-tabs">
                                <button class="filter-tab active" data-filter="all">全部</button>
                                <button class="filter-tab" data-filter="新书">新书</button>
                                <button class="filter-tab" data-filter="专题">专题</button>
                                <button class="filter-tab" data-filter="深度">深度</button>
                            </div>
                        </div>
                        <div class="articles-stream" id="articlesStream">
                            <!-- Articles loaded by JS -->
                        </div>
                    </section>
                </div>

                <!-- Sidebar -->
                <aside class="blog-sidebar">
                    <!-- About Widget -->
                    <div class="sidebar-widget">
                        <h3 class="widget-title">关于</h3>
                        <p class="widget-text">浪潮书店是一个关于阅读的线上空间。我们相信，没有人是一座孤岛，而书籍是连接彼此的桥梁。</p>
                        <a href="about.html" class="widget-link">了解更多 →</a>
                    </div>

                    <!-- Categories Widget -->
                    <div class="sidebar-widget">
                        <h3 class="widget-title">分类</h3>
                        <ul class="category-list" id="categoryList">
                            <!-- Categories loaded by JS -->
                        </ul>
                    </div>

                    <!-- Popular Books Widget -->
                    <div class="sidebar-widget">
                        <h3 class="widget-title">热门书籍</h3>
                        <div class="widget-books" id="widgetBooks">
                            <!-- Books loaded by JS -->
                        </div>
                    </div>

                    <!-- Newsletter Widget -->
                    <div class="sidebar-widget widget-highlight">
                        <h3 class="widget-title">订阅更新</h3>
                        <p class="widget-text">每周精选文章与书单，直达你的邮箱。</p>
                        <form class="newsletter-form" onsubmit="event.preventDefault(); alert('感谢订阅！');">
                            <input type="email" placeholder="your@email.com" class="newsletter-input" required>
                            <button type="submit" class="newsletter-btn">订阅</button>
                        </form>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <svg class="footer-logo" viewBox="0 0 48 32" fill="none">
                        <path d="M4 16C4 16 12 8 20 16C28 24 36 16 44 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 24C4 24 12 16 20 24C28 32 36 24 44 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                    </svg>
                    <p class="footer-slogan">没有人是一座孤岛。</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="articles.html">文章</a>
                    <a href="search.html">搜索</a>
                    <a href="about.html">关于</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Wavecrest Bookstore. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/articles.js"></script>
</body>
</html>

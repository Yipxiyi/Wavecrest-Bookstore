<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - Wavecrest Bookstore</title>
    <meta name="description" content="在 Wavecrest Bookstore 搜索书籍">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="search-page-body">
    <!-- Navigation - Icon Only -->
    <nav class="nav" id="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 16C4 16 12 8 20 16C28 24 36 16 44 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M4 24C4 24 12 16 20 24C28 32 36 24 44 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
                </svg>
            </a>
            
            <div class="nav-icons">
                <a href="index.html" class="nav-icon" title="首页">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                </a>
                <a href="articles.html" class="nav-icon" title="文章">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </a>
                <a href="search.html" class="nav-icon active" title="搜索">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </a>
                <a href="about.html" class="nav-icon" title="关于">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </a>
            </div>
            
            <button class="nav-toggle" id="navToggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Search Page Content - Vertical Layout -->
    <main class="search-page-vertical">
        <!-- 1. Search Box -->
        <section class="search-section">
            <div class="container">
                <div class="search-box-wrapper">
                    <svg class="search-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" id="mainSearchInput" class="search-input-large" placeholder="搜索书名、作者、标签..." autofocus>
                </div>
            </div>
        </section>
        
        <!-- 2. Filter Bar -->
        <section class="filter-section">
            <div class="container">
                <div class="filter-bar" id="filterBar">
                    <button class="filter-chip active" data-filter="all">全部</button>
                    <button class="filter-chip" data-filter="fiction">小说</button>
                    <button class="filter-chip" data-filter="literature">文学</button>
                    <button class="filter-chip" data-filter="design">设计</button>
                    <button class="filter-chip" data-filter="essay">随笔</button>
                    <button class="filter-chip" data-filter="business">商业</button>
                    <button class="filter-chip" data-filter="graphic">绘本</button>
                </div>
                <p class="search-result-count" id="searchResultCount"></p>
            </div>
        </section>
        
        <!-- 3. Book Wall -->
        <section class="bookwall-section">
            <div class="container">
                <div class="bookwall-grid" id="bookwallGrid">
                    <div class="bookwall-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        <p>输入关键词开始搜索</p>
                        <span>支持搜索书名、作者、标签</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <svg class="footer-logo" viewBox="0 0 48 32" fill="none">
                        <path d="M4 16C4 16 12 8 20 16C28 24 36 16 44 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 24C4 24 12 16 20 24C28 32 36 24 44 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                    </svg>
                    <p class="footer-slogan">没有人是一座孤岛。</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="articles.html">文章</a>
                    <a href="search.html">搜索</a>
                    <a href="about.html">关于</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Wavecrest Bookstore. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/search.js"></script>
</body>
</html>
